<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee File Management System</title>
<meta name="description" content="Professional physical employee file tracking system">
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#f4f7fb;--panel:#ffffff;--text:#172033;--muted:#6f7a91;--line:#dfe5ef;
  --primary:#1f4fbf;--primary-dark:#153a91;--success:#16834f;--warning:#c77a0a;
  --danger:#b42318;--info:#2563a8;--shadow:0 10px 30px rgba(28,46,79,.08);
  --radius:14px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
.hidden{display:none!important}
.app{min-height:100vh;display:grid;grid-template-columns:260px 1fr}
.sidebar{
  background:linear-gradient(180deg,#17346d,#102850);color:#fff;padding:18px 14px;
  position:sticky;top:0;height:100vh;overflow:auto
}
.brand{padding:8px 10px 18px;border-bottom:1px solid rgba(255,255,255,.16);margin-bottom:12px}
.brand h1{font-size:18px;margin:0 0 5px}.brand p{font-size:12px;margin:0;opacity:.78}
.nav button{
  width:100%;border:0;background:transparent;color:#e8efff;padding:11px 12px;
  border-radius:9px;text-align:left;margin:2px 0
}
.nav button:hover,.nav button.active{background:#2b4e8d}
.main{min-width:0}
.topbar{
  position:sticky;top:0;z-index:20;background:var(--panel);border-bottom:1px solid var(--line);
  padding:12px 18px;display:flex;align-items:center;gap:10px
}
.topbar .searchbox{flex:1;display:flex;gap:8px}
.topbar input{flex:1;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:#fff}
.content{padding:20px}
.page{display:none}.page.active{display:block}
.page-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}
.page-head h2{margin:0;font-size:26px}.page-head p{margin:4px 0 0;color:var(--muted)}
.grid{display:grid;gap:14px}
.cards{grid-template-columns:repeat(5,minmax(150px,1fr));margin-bottom:18px}
.card,.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card{padding:17px}.card span{color:var(--muted);font-size:13px}.card strong{display:block;font-size:30px;margin-top:7px}
.panel{padding:17px;margin-bottom:18px}
.panel h3{margin:0 0 14px}
.two-col{grid-template-columns:1.2fr .8fr}
.three-col{grid-template-columns:repeat(3,1fr)}
.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:12px;font-weight:700;color:var(--muted)}
.field input,.field select,.field textarea{
  border:1px solid var(--line);border-radius:9px;padding:10px 11px;background:#fff;color:var(--text)
}
.field textarea{min-height:78px;resize:vertical}
.span-2{grid-column:span 2}.span-3{grid-column:span 3}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{border:0;border-radius:9px;padding:10px 14px;font-weight:700}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-secondary{background:#e9eefb;color:#1f448f}.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}.btn-light{background:#f4f6fa;color:#27324a;border:1px solid var(--line)}
.toolbar{display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin-bottom:14px}
.toolbar .field{min-width:170px;flex:1}
.table-wrap{overflow:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.badge{display:inline-block;color:#fff;border-radius:99px;padding:5px 9px;font-size:11px;font-weight:800}
.available{background:var(--success)}.issued{background:var(--warning)}.missing{background:var(--danger)}
.under-review{background:var(--info)}.archived{background:#747b88}.damaged{background:#8a1c1c}
.location{font-family:Consolas,monospace;background:#f7f9fc;border:1px dashed #c4ccd8;padding:6px 8px;border-radius:7px;display:inline-block}
.kpi-danger{color:var(--danger)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:grid;place-items:center;padding:16px;z-index:100}
.modal-card{width:min(920px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:15px;padding:18px}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-head h3{margin:0}.close{border:0;background:#f0f2f5;width:36px;height:36px;border-radius:8px}
.timeline{border-left:3px solid var(--line);padding-left:18px}
.timeline-item{position:relative;margin-bottom:15px}.timeline-item:before{content:"";position:absolute;left:-26px;top:5px;width:12px;height:12px;border-radius:50%;background:var(--primary)}
.progress{height:8px;background:#edf0f5;border-radius:8px;overflow:hidden}.progress span{display:block;height:100%;background:var(--primary)}
.toast{position:fixed;right:18px;bottom:18px;background:#172033;color:#fff;padding:12px 15px;border-radius:9px;z-index:200}
.label-controls{display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:10px}
.preset-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.a4-sheet{width:210mm;min-height:297mm;background:#fff;color:#000;margin:0 auto;padding:10mm;border:1px solid #bbb;display:grid;align-content:start;justify-content:start}
.file-label{border:1px solid #000;background:#fff;color:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;padding:2mm;break-inside:avoid}
.dept-strip{position:absolute;left:0;top:0;bottom:0;width:4mm}
.label-grid{display:grid;grid-template-columns:1fr 14mm;gap:1.5mm;align-items:center;width:100%}
.label-main{padding-left:4mm;text-align:center}.label-name{font-weight:800}.label-codes{font-weight:700;margin-top:1mm}
.label-extra{font-size:.78em;margin-top:.8mm}.serial{position:absolute;top:1mm;right:1.5mm;border:1px solid #000;border-radius:10px;padding:.2mm 1mm;font-size:7pt}
.barcode-svg{width:100%;height:9mm;margin-top:1mm}.qr-holder{width:12mm;height:12mm}
.stat-row{display:grid;grid-template-columns:1fr auto;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.mobile-menu{display:none}
@media(max-width:1100px){.cards{grid-template-columns:repeat(3,1fr)}.form-grid{grid-template-columns:repeat(2,1fr)}.span-3{grid-column:span 2}.two-col{grid-template-columns:1fr}.label-controls{grid-template-columns:repeat(3,1fr)}}
@media(max-width:760px){
  .app{grid-template-columns:1fr}.sidebar{position:fixed;left:-280px;width:260px;z-index:90;transition:.25s}.sidebar.open{left:0}
  .mobile-menu{display:inline-block}.content{padding:12px}.cards{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:1fr}.span-2,.span-3{grid-column:span 1}
  .label-controls{grid-template-columns:repeat(2,1fr)}.a4-sheet{width:100%;min-height:auto;padding:8px}
}
@media print{
  body *{visibility:hidden}
  #printArea,#printArea *{visibility:visible}
  #printArea{position:absolute;left:0;top:0;width:210mm;min-height:297mm;margin:0;border:0}
  @page{size:A4 portrait;margin:0}
}
</style>
</head>
<body>
<div class="app">
  <aside id="sidebar" class="sidebar">
    <div class="brand">
      <h1>Employee File Management</h1>
      <p>Mohammed Abdallah Sharbatly Co.CJS</p>
    </div>
    <nav class="nav">
      <button class="active" data-page="dashboard" onclick="showPage('dashboard',this)">Dashboard</button>
      <button data-page="employees" onclick="showPage('employees',this)">Employee Files</button>
      <button data-page="add" onclick="showPage('add',this)">Add Employee</button>
      <button data-page="issues" onclick="showPage('issues',this)">Issue & Return</button>
      <button data-page="transfers" onclick="showPage('transfers',this)">File Transfers</button>
      <button data-page="locations" onclick="showPage('locations',this)">Locations</button>
      <button data-page="labels" onclick="showPage('labels',this)">Print Labels</button>
      <button data-page="reports" onclick="showPage('reports',this)">Reports</button>
      <button data-page="audit" onclick="showPage('audit',this)">Audit Log</button>
      <button data-page="backup" onclick="showPage('backup',this)">Backup / Restore</button>
    </nav>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="btn btn-light mobile-menu" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
      <div class="searchbox">
        <input id="globalSearch" placeholder="Search Name, AX, SAP, Department, Branch or Location">
        <button class="btn btn-primary" onclick="searchNow()">Search</button>
      </div>
    </header>

    <div class="content">
      <section id="dashboardPage" class="page active"></section>
      <section id="employeesPage" class="page"></section>
      <section id="addPage" class="page"></section>
      <section id="issuesPage" class="page"></section>
      <section id="transfersPage" class="page"></section>
      <section id="locationsPage" class="page"></section>
      <section id="labelsPage" class="page"></section>
      <section id="reportsPage" class="page"></section>
      <section id="auditPage" class="page"></section>
      <section id="backupPage" class="page"></section>
    </div>
  </main>
</div>

<div id="modalRoot"></div>
<div id="toast" class="toast hidden"></div>

<script>
(function(){
"use strict";
var DB_KEY="efms_professional_v1";
var companyName="Mohammed Abdallah Sharbatly Co.CJS";
var editingId=null;
var db=loadDB();

function defaultDB(){
 return {
  employees:[
   {id:1,name:"Mohammad Ariful Islam",ax:"AX-12548",sap:"70012548",employeeId:"EMP-025",nationality:"Bangladeshi",branch:"RYD",department:"ADM",jobTitle:"Document Controller",employmentStatus:"Active",fileStatus:"Available",room:"HR-01",cabinet:"C-04",rack:"R-03",shelf:"S-02",box:"B-07",position:"025",remarks:"Main personnel file",lastUpdated:today()},
   {id:2,name:"Abdul Rahman",ax:"AX-12549",sap:"70012549",employeeId:"EMP-026",nationality:"Saudi",branch:"JED",department:"HR",jobTitle:"HR Officer",employmentStatus:"Active",fileStatus:"Issued",room:"HR-01",cabinet:"C-04",rack:"R-03",shelf:"S-02",box:"B-08",position:"026",remarks:"HR file",lastUpdated:today()},
   {id:3,name:"Nayeem Hasan",ax:"AX-12550",sap:"70012550",employeeId:"EMP-027",nationality:"Bangladeshi",branch:"DMM",department:"FIN",jobTitle:"Accounts Assistant",employmentStatus:"Active",fileStatus:"Available",room:"HR-02",cabinet:"C-05",rack:"R-01",shelf:"S-01",box:"B-02",position:"014",remarks:"Finance file",lastUpdated:today()}
  ],
  issues:[{id:1,employeeId:2,issuedTo:"Khalid",issuedDepartment:"OPS",reason:"Document review",issueDate:today(),expectedReturn:today(),returned:false}],
  transfers:[],
  locations:[
   {id:1,type:"Room",code:"HR-01",parent:"RYD",capacity:500},
   {id:2,type:"Cabinet",code:"C-04",parent:"HR-01",capacity:200},
   {id:3,type:"Box",code:"B-07",parent:"S-02",capacity:50}
  ],
  audit:[{id:1,time:new Date().toISOString(),action:"System initialized",details:"Professional local database created"}]
 };
}
function loadDB(){try{var r=localStorage.getItem(DB_KEY);return r?JSON.parse(r):defaultDB()}catch(e){return defaultDB()}}
function saveDB(){localStorage.setItem(DB_KEY,JSON.stringify(db))}
function today(){return new Date().toISOString().slice(0,10)}
function nextId(arr){var m=0;arr.forEach(function(x){m=Math.max(m,Number(x.id)||0)});return m+1}
function esc(v){return String(v==null?"":v).replace(/[&<>"']/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]})}
function loc(e){return [e.room,e.cabinet,e.rack,e.shelf,e.box,e.position].filter(Boolean).join(" / ")}
function badgeClass(s){return String(s||"").toLowerCase().replace(/ /g,"-")}
function addAudit(action,details){db.audit.unshift({id:nextId(db.audit),time:new Date().toISOString(),action:action,details:details});saveDB()}
function toast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.remove("hidden");setTimeout(function(){t.classList.add("hidden")},2200)}
function deptColor(dept){var m={HR:"#1e88e5",ADM:"#43a047",FIN:"#8e24aa",OPS:"#fb8c00",IT:"#546e7a",PRD:"#e53935",SALES:"#00897b"};return m[String(dept||"").toUpperCase()]||"#3949ab"}

window.showPage=function(name,btn){
 document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active")});
 document.getElementById(name+"Page").classList.add("active");
 document.querySelectorAll(".nav button").forEach(function(b){b.classList.remove("active")});
 if(btn)btn.classList.add("active");
 document.getElementById("sidebar").classList.remove("open");
 renderPage(name);
};
function renderPage(name){
 if(name==="dashboard")renderDashboard();
 if(name==="employees")renderEmployees("");
 if(name==="add")renderForm();
 if(name==="issues")renderIssues();
 if(name==="transfers")renderTransfers();
 if(name==="locations")renderLocations();
 if(name==="labels")renderLabels();
 if(name==="reports")renderReports();
 if(name==="audit")renderAudit();
 if(name==="backup")renderBackup();
}
function card(label,val,cls){return '<div class="card"><span>'+label+'</span><strong class="'+(cls||"")+'">'+val+'</strong></div>'}

function renderDashboard(){
 var total=db.employees.length;
 var available=db.employees.filter(function(e){return e.fileStatus==="Available"}).length;
 var issued=db.employees.filter(function(e){return e.fileStatus==="Issued"}).length;
 var missing=db.employees.filter(function(e){return e.fileStatus==="Missing"}).length;
 var under=db.employees.filter(function(e){return e.fileStatus==="Under Review"}).length;
 var overdue=db.issues.filter(function(i){return !i.returned&&i.expectedReturn<today()}).length;
 var dept={};db.employees.forEach(function(e){dept[e.department]=(dept[e.department]||0)+1});
 var deptRows=Object.keys(dept).map(function(k){return '<div class="stat-row"><span><b>'+esc(k)+'</b></span><strong>'+dept[k]+'</strong></div>'}).join("");
 document.getElementById("dashboardPage").innerHTML=
  '<div class="page-head"><div><h2>Dashboard</h2><p>'+esc(companyName)+'</p></div><button class="btn btn-primary" onclick="goAdd()">+ Add Employee File</button></div>'+
  '<div class="grid cards">'+card("Total Files",total)+card("Available",available)+card("Issued",issued)+card("Missing",missing,"kpi-danger")+card("Overdue",overdue,"kpi-danger")+'</div>'+
  '<div class="grid two-col"><div class="panel"><h3>Recent Employee Files</h3>'+employeeTable(db.employees.slice().reverse().slice(0,8))+'</div>'+
  '<div><div class="panel"><h3>Files by Department</h3>'+deptRows+'</div><div class="panel"><h3>Quick Summary</h3><div class="stat-row"><span>Under Review</span><strong>'+under+'</strong></div><div class="stat-row"><span>Locations</span><strong>'+db.locations.length+'</strong></div><div class="stat-row"><span>Transfers</span><strong>'+db.transfers.length+'</strong></div></div></div></div>';
}

function employeeTable(list){
 var rows=list.map(function(e){
  return '<tr><td><b>'+esc(e.name)+'</b><br><small>'+esc(e.employeeId)+'</small></td><td>'+esc(e.ax)+'</td><td>'+esc(e.sap)+'</td><td>'+esc(e.department)+' / '+esc(e.branch)+'</td><td><span class="badge '+badgeClass(e.fileStatus)+'">'+esc(e.fileStatus)+'</span></td><td><span class="location">'+esc(loc(e))+'</span></td><td><div class="actions"><button class="btn btn-light" onclick="viewEmployee('+e.id+')">View</button><button class="btn btn-secondary" onclick="editEmployee('+e.id+')">Edit</button>'+(e.fileStatus==="Available"?'<button class="btn btn-primary" onclick="issueEmployee('+e.id+')">Issue</button>':'')+(e.fileStatus==="Issued"?'<button class="btn btn-success" onclick="returnEmployee('+e.id+')">Return</button>':'')+'</div></td></tr>';
 }).join("");
 if(!rows)rows='<tr><td colspan="7">No records found</td></tr>';
 return '<div class="table-wrap"><table><thead><tr><th>Employee</th><th>AX</th><th>SAP</th><th>Dept / Branch</th><th>Status</th><th>Location</th><th>Actions</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function renderEmployees(q){
 q=String(q||"").toLowerCase();
 var dept=(document.getElementById("filterDept")||{}).value||"";
 var status=(document.getElementById("filterStatus")||{}).value||"";
 var list=db.employees.filter(function(e){
  var hit=!q||Object.keys(e).some(function(k){return String(e[k]).toLowerCase().indexOf(q)>-1});
  return hit&&(!dept||e.department===dept)&&(!status||e.fileStatus===status);
 });
 var depts=[].concat.apply([],db.employees.map(function(e){return [e.department]})).filter(function(v,i,a){return a.indexOf(v)===i});
 document.getElementById("employeesPage").innerHTML=
  '<div class="page-head"><div><h2>Employee Files</h2><p>'+list.length+' record(s)</p></div><button class="btn btn-primary" onclick="goAdd()">+ Add Employee</button></div>'+
  '<div class="panel"><div class="toolbar"><div class="field"><label>Search</label><input id="employeeSearch" value="'+esc(q)+'" oninput="renderEmployees(this.value)" placeholder="Name, AX, SAP, location"></div>'+
  '<div class="field"><label>Department</label><select id="filterDept" onchange="renderEmployees(document.getElementById(\'employeeSearch\').value)"><option value="">All</option>'+depts.map(function(d){return '<option>'+esc(d)+'</option>'}).join("")+'</select></div>'+
  '<div class="field"><label>Status</label><select id="filterStatus" onchange="renderEmployees(document.getElementById(\'employeeSearch\').value)"><option value="">All</option><option>Available</option><option>Issued</option><option>Missing</option><option>Under Review</option><option>Archived</option></select></div>'+
  '<button class="btn btn-light" onclick="exportCSV()">Export CSV</button></div>'+employeeTable(list)+'</div>';
}
window.searchNow=function(){var q=document.getElementById("globalSearch").value;showPage("employees",document.querySelector('[data-page="employees"]'));renderEmployees(q)};
window.goAdd=function(){editingId=null;showPage("add",document.querySelector('[data-page="add"]'))};

function field(n,l,v,t,req){return '<div class="field"><label>'+l+(req?' *':'')+'</label><input name="'+n+'" type="'+(t||"text")+'" value="'+esc(v||"")+'" '+(req?'required':'')+'></div>'}
function selectField(n,l,opts,v){return '<div class="field"><label>'+l+'</label><select name="'+n+'">'+opts.map(function(o){return '<option '+(o===v?'selected':'')+'>'+o+'</option>'}).join("")+'</select></div>'}

function renderForm(id){
 var e=id?db.employees.find(function(x){return x.id===id})||{}:{};
 editingId=id||null;
 document.getElementById("addPage").innerHTML=
  '<div class="page-head"><div><h2>'+(id?'Edit':'Add')+' Employee File</h2><p>Employee identity, job details and exact physical location</p></div></div>'+
  '<form id="employeeForm" class="panel"><h3>Employee Information</h3><div class="form-grid">'+
  field("name","Employee Full Name",e.name,"text",true)+field("ax","AX Number",e.ax,"text",true)+field("sap","SAP Number",e.sap,"text",true)+
  field("employeeId","Employee ID",e.employeeId)+field("nationality","Nationality",e.nationality)+field("jobTitle","Job Title",e.jobTitle,"text",true)+
  field("department","Department Short Name",e.department,"text",true)+field("branch","Branch Short Name",e.branch,"text",true)+
  selectField("employmentStatus","Employment Status",["Active","Vacation","Transferred","Resigned","Terminated","Final Exit","Archived"],e.employmentStatus||"Active")+
  '</div><h3 style="margin-top:20px">Physical File Location</h3><div class="form-grid">'+
  field("room","Room",e.room,"text",true)+field("cabinet","Cabinet",e.cabinet,"text",true)+field("rack","Rack",e.rack,"text",true)+
  field("shelf","Shelf",e.shelf,"text",true)+field("box","Box",e.box,"text",true)+field("position","Position",e.position,"text",true)+
  selectField("fileStatus","File Status",["Available","Issued","Missing","Under Review","Archived","Damaged"],e.fileStatus||"Available")+
  '<div class="field span-3"><label>Remarks</label><textarea name="remarks">'+esc(e.remarks||"")+'</textarea></div></div>'+
  '<div class="actions" style="margin-top:18px"><button class="btn btn-primary">Save Record</button><button type="button" class="btn btn-light" onclick="showPage(\'employees\',document.querySelector(\'[data-page=employees]\'))">Cancel</button></div></form>';
 document.getElementById("employeeForm").onsubmit=saveEmployee;
}
function saveEmployee(ev){
 ev.preventDefault();var d={};new FormData(ev.target).forEach(function(v,k){d[k]=String(v).trim()});
 var dup=db.employees.find(function(e){return e.id!==editingId&&(e.ax.toLowerCase()===d.ax.toLowerCase()||e.sap.toLowerCase()===d.sap.toLowerCase())});
 if(dup){toast("Duplicate AX Number or SAP Number");return}
 var occupied=db.employees.find(function(e){return e.id!==editingId&&["room","cabinet","rack","shelf","box","position"].every(function(k){return e[k]===d[k]})});
 if(occupied&&!confirm("This location is already occupied. Continue?"))return;
 if(editingId){
  var old=db.employees.find(function(e){return e.id===editingId});Object.keys(d).forEach(function(k){old[k]=d[k]});old.lastUpdated=today();addAudit("Employee updated",old.name+" ("+old.ax+")");
 }else{
  d.id=nextId(db.employees);d.lastUpdated=today();db.employees.push(d);addAudit("Employee created",d.name+" ("+d.ax+")");
 }
 saveDB();editingId=null;toast("Record saved");showPage("employees",document.querySelector('[data-page="employees"]'));
}
window.editEmployee=function(id){showPage("add",document.querySelector('[data-page="add"]'));renderForm(id)};
window.viewEmployee=function(id){
 var e=db.employees.find(function(x){return x.id===id});
 var history=db.audit.filter(function(a){return a.details.indexOf(e.ax)>-1||a.details.indexOf(e.name)>-1}).slice(0,15);
 document.getElementById("modalRoot").innerHTML='<div class="modal"><div class="modal-card"><div class="modal-head"><h3>'+esc(e.name)+'</h3><button class="close" onclick="closeModal()">×</button></div>'+
 '<div class="grid two-col"><div><p><b>AX:</b> '+esc(e.ax)+' &nbsp; <b>SAP:</b> '+esc(e.sap)+'</p><p><b>Department:</b> '+esc(e.department)+' &nbsp; <b>Branch:</b> '+esc(e.branch)+'</p><p><b>Job Title:</b> '+esc(e.jobTitle)+'</p><p><b>Status:</b> <span class="badge '+badgeClass(e.fileStatus)+'">'+esc(e.fileStatus)+'</span></p><h3>Current Location</h3><div class="location" style="font-size:17px">'+esc(loc(e))+'</div><p><b>Remarks:</b> '+esc(e.remarks)+'</p></div>'+
 '<div><h3>File History</h3><div class="timeline">'+(history.map(function(h){return '<div class="timeline-item"><b>'+esc(h.action)+'</b><br><small>'+esc(h.details)+'</small><br><small>'+new Date(h.time).toLocaleString()+'</small></div>'}).join("")||'<p>No history</p>')+'</div></div></div></div></div>';
};
window.closeModal=function(){document.getElementById("modalRoot").innerHTML=""};

window.issueEmployee=function(id){
 var e=db.employees.find(function(x){return x.id===id});
 document.getElementById("modalRoot").innerHTML='<div class="modal"><form id="issueForm" class="modal-card"><div class="modal-head"><h3>Issue File: '+esc(e.name)+'</h3><button type="button" class="close" onclick="closeModal()">×</button></div><div class="form-grid">'+
 field("issuedTo","Issued To Person","","text",true)+field("issuedDepartment","Issued To Department","","text",true)+field("reason","Reason","","text",true)+field("issueDate","Issue Date",today(),"date",true)+field("expectedReturn","Expected Return",today(),"date",true)+'</div><div class="actions" style="margin-top:18px"><button class="btn btn-primary">Issue File</button></div></form></div>';
 document.getElementById("issueForm").onsubmit=function(ev){ev.preventDefault();var d={};new FormData(ev.target).forEach(function(v,k){d[k]=v});d.id=nextId(db.issues);d.employeeId=id;d.returned=false;db.issues.push(d);e.fileStatus="Issued";e.lastUpdated=today();addAudit("File issued",e.name+" ("+e.ax+") to "+d.issuedTo);saveDB();closeModal();toast("File issued");renderIssues()};
};
window.returnEmployee=function(id){
 var e=db.employees.find(function(x){return x.id===id});var i=db.issues.find(function(x){return x.employeeId===id&&!x.returned});if(i){i.returned=true;i.returnDate=today()}e.fileStatus="Available";e.lastUpdated=today();addAudit("File returned",e.name+" ("+e.ax+")");saveDB();toast("File returned");renderPage(document.querySelector(".page.active").id.replace("Page",""));
};

function renderIssues(){
 var active=db.issues.filter(function(i){return !i.returned});
 var rows=active.map(function(i){var e=db.employees.find(function(x){return x.id===i.employeeId})||{};var overdue=i.expectedReturn<today();return '<tr><td><b>'+esc(e.name)+'</b><br>'+esc(e.ax)+'</td><td>'+esc(i.issuedTo)+'</td><td>'+esc(i.issuedDepartment)+'</td><td>'+esc(i.issueDate)+'</td><td class="'+(overdue?'kpi-danger':'')+'">'+esc(i.expectedReturn)+'</td><td><button class="btn btn-success" onclick="returnEmployee('+e.id+')">Return</button></td></tr>'}).join("");
 if(!rows)rows='<tr><td colspan="6">No issued files</td></tr>';
 document.getElementById("issuesPage").innerHTML='<div class="page-head"><div><h2>Issue & Return</h2><p>Track all files outside storage</p></div></div><div class="panel"><div class="table-wrap"><table><thead><tr><th>Employee</th><th>Issued To</th><th>Department</th><th>Issue Date</th><th>Expected Return</th><th>Action</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

function renderTransfers(){
 var rows=db.transfers.map(function(t){var e=db.employees.find(function(x){return x.id===t.employeeId})||{};return '<tr><td>'+esc(e.name)+'</td><td>'+esc(t.oldLocation)+'</td><td>'+esc(t.newLocation)+'</td><td>'+esc(t.date)+'</td><td>'+esc(t.reason)+'</td></tr>'}).join("");
 if(!rows)rows='<tr><td colspan="5">No transfer history</td></tr>';
 document.getElementById("transfersPage").innerHTML='<div class="page-head"><div><h2>File Transfers</h2><p>Move files while preserving location history</p></div><button class="btn btn-primary" onclick="openTransfer()">+ New Transfer</button></div><div class="panel"><div class="table-wrap"><table><thead><tr><th>Employee</th><th>Previous</th><th>New Location</th><th>Date</th><th>Reason</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}
window.openTransfer=function(){
 document.getElementById("modalRoot").innerHTML='<div class="modal"><form id="transferForm" class="modal-card"><div class="modal-head"><h3>Transfer File</h3><button type="button" class="close" onclick="closeModal()">×</button></div><div class="form-grid"><div class="field span-3"><label>Employee</label><select name="employeeId" required><option value="">Select</option>'+db.employees.map(function(e){return '<option value="'+e.id+'">'+esc(e.name)+' — '+esc(e.ax)+'</option>'}).join("")+'</select></div>'+
 field("room","New Room","","text",true)+field("cabinet","New Cabinet","","text",true)+field("rack","New Rack","","text",true)+field("shelf","New Shelf","","text",true)+field("box","New Box","","text",true)+field("position","New Position","","text",true)+field("reason","Transfer Reason","","text",true)+field("date","Transfer Date",today(),"date",true)+'</div><div class="actions" style="margin-top:18px"><button class="btn btn-primary">Save Transfer</button></div></form></div>';
 document.getElementById("transferForm").onsubmit=function(ev){ev.preventDefault();var d={};new FormData(ev.target).forEach(function(v,k){d[k]=v});var e=db.employees.find(function(x){return x.id===Number(d.employeeId)});var old=loc(e);Object.assign(e,{room:d.room,cabinet:d.cabinet,rack:d.rack,shelf:d.shelf,box:d.box,position:d.position,lastUpdated:today()});db.transfers.unshift({id:nextId(db.transfers),employeeId:e.id,oldLocation:old,newLocation:loc(e),reason:d.reason,date:d.date});addAudit("File transferred",e.name+" ("+e.ax+") from "+old+" to "+loc(e));saveDB();closeModal();renderTransfers();toast("Transfer saved")};
};

function renderLocations(){
 var rows=db.locations.map(function(l){var key={Room:"room",Cabinet:"cabinet",Rack:"rack",Shelf:"shelf",Box:"box",Position:"position"}[l.type];var used=db.employees.filter(function(e){return e[key]===l.code}).length;var pct=Math.min(100,Math.round(used/(Number(l.capacity)||1)*100));return '<tr><td>'+esc(l.type)+'</td><td><b>'+esc(l.code)+'</b></td><td>'+esc(l.parent)+'</td><td>'+used+' / '+l.capacity+'<div class="progress"><span style="width:'+pct+'%"></span></div></td></tr>'}).join("");
 document.getElementById("locationsPage").innerHTML='<div class="page-head"><div><h2>Location Management</h2><p>Room → Cabinet → Rack → Shelf → Box → Position</p></div></div><div class="grid two-col"><form id="locationForm" class="panel"><h3>Add Location</h3><div class="form-grid">'+selectField("type","Type",["Room","Cabinet","Rack","Shelf","Box","Position"],"Room")+field("code","Code","","text",true)+field("parent","Parent","","text",true)+field("capacity","Capacity","100","number",true)+'</div><button class="btn btn-primary" style="margin-top:16px">Add Location</button></form><div class="panel"><h3>Location Capacity</h3><div class="table-wrap"><table><thead><tr><th>Type</th><th>Code</th><th>Parent</th><th>Capacity</th></tr></thead><tbody>'+rows+'</tbody></table></div></div></div>';
 document.getElementById("locationForm").onsubmit=function(ev){ev.preventDefault();var d={};new FormData(ev.target).forEach(function(v,k){d[k]=v});d.id=nextId(db.locations);db.locations.push(d);addAudit("Location added",d.type+" "+d.code);saveDB();renderLocations();toast("Location added")};
}

function renderLabels(){
 var rows=db.employees.map(function(e){return '<tr><td><input class="labelCheck" type="checkbox" value="'+e.id+'" onchange="renderPrintArea()"></td><td>'+esc(e.name)+'</td><td>'+esc(e.ax)+'</td><td>'+esc(e.sap)+'</td><td>'+esc(e.department)+' / '+esc(e.branch)+'</td><td>'+esc(loc(e))+'</td></tr>'}).join("");
 document.getElementById("labelsPage").innerHTML='<div class="page-head"><div><h2>Professional Label Designer</h2><p>Real Barcode + QR Code + Department Color + A4 serial layout</p></div><div class="actions"><button class="btn btn-light" onclick="selectAllLabels(true)">Select All</button><button class="btn btn-light" onclick="selectAllLabels(false)">Clear</button><button class="btn btn-primary" onclick="window.print()">Print A4</button></div></div>'+
 '<div class="panel"><h3>Label Settings</h3><div class="label-controls">'+setting("labelWidth","Width (mm)",80)+setting("labelHeight","Height (mm)",35)+setting("gapX","Horizontal Gap",4)+setting("gapY","Vertical Gap",4)+setting("fontSize","Font Size (pt)",10)+setting("pageMargin","A4 Margin (mm)",10)+setting("serialStart","Start Serial",1)+'</div>'+
 '<div class="preset-row"><button class="btn btn-light" onclick="setPreset(70,30)">Small</button><button class="btn btn-light" onclick="setPreset(80,35)">Medium</button><button class="btn btn-light" onclick="setPreset(90,40)">Large</button><button class="btn btn-light" onclick="setPreset(100,50)">XL</button>'+
 '<label><input id="showBarcode" type="checkbox" checked onchange="renderPrintArea()"> Barcode</label><label><input id="showQR" type="checkbox" checked onchange="renderPrintArea()"> QR</label><label><input id="showLocation" type="checkbox" checked onchange="renderPrintArea()"> Location</label><label><input id="showColor" type="checkbox" checked onchange="renderPrintArea()"> Department Color</label></div></div>'+
 '<div class="panel"><div class="table-wrap"><table><thead><tr><th></th><th>Name</th><th>AX</th><th>SAP</th><th>Dept / Branch</th><th>Location</th></tr></thead><tbody>'+rows+'</tbody></table></div></div><div id="printArea" class="a4-sheet"></div>';
 renderPrintArea();
}
function setting(id,label,val){return '<div class="field"><label>'+label+'</label><input id="'+id+'" type="number" value="'+val+'" oninput="renderPrintArea()"></div>'}
window.selectAllLabels=function(s){document.querySelectorAll(".labelCheck").forEach(function(c){c.checked=s});renderPrintArea()};
window.setPreset=function(w,h){document.getElementById("labelWidth").value=w;document.getElementById("labelHeight").value=h;renderPrintArea()};
window.renderPrintArea=function(){
 var area=document.getElementById("printArea");if(!area)return;
 var w=Number(document.getElementById("labelWidth").value||80),h=Number(document.getElementById("labelHeight").value||35),gx=Number(document.getElementById("gapX").value||4),gy=Number(document.getElementById("gapY").value||4),fs=Number(document.getElementById("fontSize").value||10),pm=Number(document.getElementById("pageMargin").value||10),serial=Number(document.getElementById("serialStart").value||1);
 var showBarcode=document.getElementById("showBarcode").checked,showQR=document.getElementById("showQR").checked,showLocation=document.getElementById("showLocation").checked,showColor=document.getElementById("showColor").checked;
 area.style.padding=pm+"mm";area.style.gridTemplateColumns="repeat(auto-fill,"+w+"mm)";area.style.gridAutoRows=h+"mm";area.style.columnGap=gx+"mm";area.style.rowGap=gy+"mm";
 var selected=[].slice.call(document.querySelectorAll(".labelCheck:checked")).map(function(c){return Number(c.value)});
 area.innerHTML=selected.map(function(id,i){var e=db.employees.find(function(x){return x.id===id});return '<div class="file-label" style="width:'+w+'mm;height:'+h+'mm;font-size:'+fs+'pt">'+(showColor?'<div class="dept-strip" style="background:'+deptColor(e.department)+'"></div>':'')+'<span class="serial">'+(serial+i)+'</span><div class="label-grid"><div class="label-main"><div class="label-name">'+esc(e.name)+'</div><div class="label-codes">'+esc(e.ax)+' · '+esc(e.sap)+'</div><div class="label-extra"><b>'+esc(e.department)+'</b> | <b>'+esc(e.branch)+'</b></div>'+(showLocation?'<div class="label-extra">'+esc(loc(e))+'</div>':'')+(showBarcode?'<svg class="barcode-svg" id="bc-'+id+'-'+i+'"></svg>':'')+'</div><div>'+(showQR?'<div class="qr-holder" id="qr-'+id+'-'+i+'"></div>':'')+'</div></div></div>'}).join("");
 selected.forEach(function(id,i){
  var e=db.employees.find(function(x){return x.id===id});
  if(showBarcode&&window.JsBarcode){try{JsBarcode("#bc-"+id+"-"+i,e.ax.replace(/[^A-Za-z0-9]/g,"")+e.sap,{format:"CODE128",displayValue:false,margin:0,height:28,width:1})}catch(err){}}
  if(showQR&&window.QRCode){try{new QRCode(document.getElementById("qr-"+id+"-"+i),{text:JSON.stringify({name:e.name,ax:e.ax,sap:e.sap,dept:e.department,branch:e.branch,location:loc(e)}),width:45,height:45,correctLevel:QRCode.CorrectLevel.M})}catch(err){}}
 });
};

function renderReports(){
 var groups={};db.employees.forEach(function(e){groups[e.department]=(groups[e.department]||0)+1});
 document.getElementById("reportsPage").innerHTML='<div class="page-head"><div><h2>Reports</h2><p>Operational file management summary</p></div><button class="btn btn-primary" onclick="window.print()">Print</button></div><div class="grid cards">'+card("Total",db.employees.length)+card("Available",db.employees.filter(function(e){return e.fileStatus==="Available"}).length)+card("Issued",db.employees.filter(function(e){return e.fileStatus==="Issued"}).length)+card("Missing",db.employees.filter(function(e){return e.fileStatus==="Missing"}).length)+card("Transfers",db.transfers.length)+'</div><div class="grid two-col"><div class="panel"><h3>Master File List</h3>'+employeeTable(db.employees)+'</div><div class="panel"><h3>By Department</h3>'+Object.keys(groups).map(function(k){return '<div class="stat-row"><span>'+esc(k)+'</span><strong>'+groups[k]+'</strong></div>'}).join("")+'</div></div>';
}
function renderAudit(){
 document.getElementById("auditPage").innerHTML='<div class="page-head"><div><h2>Audit Log</h2><p>System activity history</p></div></div><div class="panel"><div class="table-wrap"><table><thead><tr><th>Date & Time</th><th>Action</th><th>Details</th></tr></thead><tbody>'+db.audit.map(function(a){return '<tr><td>'+new Date(a.time).toLocaleString()+'</td><td>'+esc(a.action)+'</td><td>'+esc(a.details)+'</td></tr>'}).join("")+'</tbody></table></div></div>';
}
function renderBackup(){
 document.getElementById("backupPage").innerHTML='<div class="page-head"><div><h2>Backup / Restore</h2><p>Protect your local employee database</p></div></div><div class="panel"><div class="actions"><button class="btn btn-primary" onclick="downloadBackup()">Download JSON Backup</button><button class="btn btn-light" onclick="exportCSV()">Export CSV</button><label class="btn btn-light">Restore JSON<input type="file" accept=".json" hidden onchange="restoreBackup(this.files[0])"></label><button class="btn btn-danger" onclick="resetData()">Reset Data</button></div></div>';
}
function download(name,text,type){var a=document.createElement("a");a.href=URL.createObjectURL(new Blob([text],{type:type}));a.download=name;document.body.appendChild(a);a.click();a.remove()}
window.downloadBackup=function(){download("efms-backup-"+today()+".json",JSON.stringify(db,null,2),"application/json");addAudit("Backup downloaded","Full JSON backup")};
window.restoreBackup=function(file){if(!file)return;var r=new FileReader();r.onload=function(){try{var x=JSON.parse(r.result);if(!x.employees)throw 0;db=x;saveDB();toast("Backup restored");renderDashboard()}catch(e){toast("Invalid backup")}};r.readAsText(file)};
window.resetData=function(){if(confirm("Reset all data?")){db=defaultDB();saveDB();renderDashboard();toast("Data reset")}};
window.exportCSV=function(){var h=["name","ax","sap","employeeId","nationality","department","branch","jobTitle","employmentStatus","fileStatus","room","cabinet","rack","shelf","box","position","remarks"];var lines=[h.join(",")].concat(db.employees.map(function(e){return h.map(function(k){return '"'+String(e[k]||"").replace(/"/g,'""')+'"'}).join(",")}));download("employee-files.csv",lines.join("\n"),"text/csv")};

document.getElementById("globalSearch").addEventListener("keydown",function(e){if(e.key==="Enter")searchNow()});
saveDB();renderDashboard();
})();
</script>
</body>
</html>
